site_name: Brain Hub
site_description: Engineering & Design Intelligence

nav:
  - Home: index.md
  - Cloud:
      - Azure:
          - Access: cloud/azure/access.md
          - Authentication: cloud/azure/auth.md
  - Git: git.md
  - Markdown: markdown.md

theme:
  name: material
  icon:
    logo: material/brain

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white

  font:
    text: Inter
    code: Roboto Mono

  features:
    # --- NAVBAR TO SIDEBAR CHANGE ---
    # Removed: navigation.tabs
    # Removed: navigation.tabs.sticky
    - navigation.sections # Keeps sidebar headers clean
    - navigation.expand # Automatically expands all sidebar items
    # --------------------------------
    - navigation.path # Breadcrumbs (Essential for side-nav layouts)
    - navigation.top # Back to top button
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/your-username

watch:
  - docs
